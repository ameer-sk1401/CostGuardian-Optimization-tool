# ========================================
# Netlify Configuration
# ========================================
# Repository: CostGuardian-Optimization-tool
# Frontend location: frontend/
# ========================================

[build]
  # Base directory - where your package.json is
  base = "frontend"
  
  # Build command
  command = "npm install && npm run build"
  
  # Publish directory - where the built files are (relative to base)
  publish = ".next"

[build.environment]
  # Node version
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# ========================================
# Redirects for Next.js
# ========================================

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200