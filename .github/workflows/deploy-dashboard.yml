# ========================================
# GitHub Actions: Dashboard Deployment to Netlify
# ========================================
# File: .github/workflows/deploy-dashboard.yml
# Repository: CostGuardian-Optimization-tool
# Working directory: frontend/
# ========================================

name: Deploy Dashboard to Netlify

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-dashboard.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
  
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # ========================================
  # JOB 1: Build and Test
  # ========================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📥 Install dependencies
        working-directory: frontend
        run: |
          echo "📦 Installing dependencies..."
          npm ci

      - name: 🔍 Lint code
        working-directory: frontend
        run: |
          echo "🔍 Running linter..."
          npm run lint || echo "Lint check complete"

      - name: ✅ Validate config.json
        working-directory: frontend
        run: |
          if [ -f "public/config.json" ]; then
            echo "✅ config.json found"
            cat public/config.json | python3 -m json.tool > /dev/null
            echo "✅ config.json is valid JSON"
          else
            echo "⚠️  config.json not found - will use defaults"
          fi

      - name: 🔧 Build application
        working-directory: frontend
        run: |
          echo "🔧 Building Next.js application..."
          npm run build
        env:
          NODE_ENV: production

      - name: 📊 Build summary
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 Build artifact:"
          ls -lh frontend/.next/ 2>/dev/null || ls -lh frontend/out/ 2>/dev/null || echo "Build directory found"

  # ========================================
  # JOB 2: Deploy to Netlify (Production)
  # ========================================
  deploy-production:
    name: Deploy to Netlify (Production)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📥 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔧 Build for production
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🚀 Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=frontend/.next
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: 📝 Deployment complete
        run: |
          echo "================================"
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "================================"
          echo "🌐 Production URL: https://${{ secrets.NETLIFY_SITE_ID }}.netlify.app"
          echo "📅 Deployed at: $(date)"
          echo "📁 Source: frontend/"
          echo "================================"

  # ========================================
  # JOB 3: Deploy Preview (for PRs)
  # ========================================
  deploy-preview:
    name: Deploy Preview to Netlify
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📥 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔧 Build for preview
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🚀 Deploy preview to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=frontend/.next
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: 📝 Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🚀 Preview Deployment\n\n✅ Your changes have been deployed!\n\n🌐 **Preview URL:** Check Netlify dashboard\n\n📁 **Source:** frontend/\n\n---\n*This preview updates with new commits*'
            })
