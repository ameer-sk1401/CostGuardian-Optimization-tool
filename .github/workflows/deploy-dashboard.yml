# ========================================
# GitHub Actions: Dashboard Deployment to Netlify
# ========================================
# File: .github/workflows/deploy-dashboard.yml
# Repository: cost-guardian-dashboard
# Triggers: Push to main or pull request
# ========================================

name: Deploy Dashboard to Netlify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # ========================================
  # JOB 1: Build and Test
  # ========================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm ci

      - name: 🔍 Lint code
        run: |
          echo "🔍 Running linter..."
          npm run lint || echo "Lint check complete"

      - name: ✅ Validate config.json
        run: |
          if [ -f "public/config.json" ]; then
            echo "✅ config.json found"
            cat public/config.json | python3 -m json.tool > /dev/null
            echo "✅ config.json is valid JSON"
          else
            echo "⚠️  config.json not found - will use defaults"
          fi

      - name: 🔧 Build application
        run: |
          echo "🔧 Building Next.js application..."
          npm run build
        env:
          NODE_ENV: production

      - name: 📊 Build summary
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 Build artifact:"
          ls -lh .next/ || ls -lh out/ || echo "Build directory not found"

      - name: 💾 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: |
            .next
            out
            public
            package.json
          retention-days: 1

  # ========================================
  # JOB 2: Deploy to Netlify (Production)
  # ========================================
  deploy-production:
    name: Deploy to Netlify (Production)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔧 Build for production
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🚀 Deploy to Netlify
        uses: netlify/actions/cli@master
        id: deploy
        with:
          args: deploy --prod --dir=.next
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: 📝 Get deploy URL
        run: |
          echo "================================"
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "================================"
          echo "🌐 Production URL: https://${{ secrets.NETLIFY_SITE_ID }}.netlify.app"
          echo "📅 Deployed at: $(date)"
          echo "================================"

      - name: ✅ Verify deployment
        run: |
          SITE_URL="https://${{ secrets.NETLIFY_SITE_ID }}.netlify.app"
          echo "🔍 Checking site availability..."
          
          # Wait a few seconds for deployment to propagate
          sleep 10
          
          # Check if site is up
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $SITE_URL)
          
          if [ $HTTP_CODE -eq 200 ]; then
            echo "✅ Site is live and accessible!"
          else
            echo "⚠️  Site returned HTTP $HTTP_CODE"
          fi

  # ========================================
  # JOB 3: Deploy Preview (for PRs)
  # ========================================
  deploy-preview:
    name: Deploy Preview to Netlify
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔧 Build for preview
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🚀 Deploy preview to Netlify
        uses: netlify/actions/cli@master
        id: deploy
        with:
          args: deploy --dir=.next
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: 📝 Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const netlifyUrl = process.env.NETLIFY_PREVIEW_URL || 'https://${{ secrets.NETLIFY_SITE_ID }}.netlify.app';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployment\n\n✅ Your changes have been deployed to Netlify!\n\n🌐 **Preview URL:** ${netlifyUrl}\n\n---\n*This preview will be updated with new commits*`
            })

  # ========================================
  # JOB 4: Notify on Success
  # ========================================
  notify:
    name: Notify Success
    needs: [deploy-production]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: 🎉 Success message
        run: |
          echo "================================"
          echo "✅ ALL JOBS COMPLETED!"
          echo "================================"
          echo "🔧 Build: ✅ Success"
          echo "🚀 Deploy: ✅ Success"
          echo "🌐 Dashboard: Live on Netlify!"
          echo "================================"
